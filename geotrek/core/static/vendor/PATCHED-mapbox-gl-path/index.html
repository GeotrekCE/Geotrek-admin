<!DOCTYPE html>
<html>
<head>
    <title>Tests</title>
    <link rel='stylesheet' href='https://unpkg.com/maplibre-gl@5.16.0/dist/maplibre-gl.css' />
    <script src='https://unpkg.com/maplibre-gl@5.16.0/dist/maplibre-gl.js'></script>
    <link rel='stylesheet' href='./mapbox-gl-path.css' />
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        #map {
            height: 100%;
            width: 50%;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <button id=clear-route-btn>Clear route</button>
    <button id=log-route-btn>Log route</button>
    <button id=set-feature-collection-btn>Set feature collection</button>
    <button id=set-linestring-btn>Set linestring</button>
    <button id=log-loop-btn>Set loop trail</button>
    <button id=log-one-way-btn>Set one way trail</button>

    <script type="module">
        import MapboxPathControl from './patched-mapbox-gl-path.js';

        const initialLineString = {
              "type": "Feature",
              "geometry": {
                "type": "LineString",
                "coordinates": [
                  [
                    1.444187,
                    43.584461
                  ],
                  [
                    1.444174,
                    43.583902
                  ],
                  [
                    1.447712,
                    43.584401
                  ],
                  [
                    1.448439,
                    43.584258
                  ],
                  [
                    1.450551,
                    43.583664
                  ],
                  [
                    1.450716,
                    43.583681
                  ],
                  [
                    1.456207,
                    43.585915
                  ]
                ]
              },
              "properties": {
                "index": 0,
                "isFollowingDirections": true,
                "directionID": 2
              }
            }

        const initialFeatureCollection = {
          "type": "FeatureCollection",
          "features": [
            {
              "type": "Feature",
              "geometry": {
                "type": "Point",
                "coordinates": [
                  1.4445662176173926,
                  43.58445067008731
                ]
              },
              "properties": {
                "index": 0
              }
            },
            {
              "type": "Feature",
              "geometry": {
                "type": "Point",
                "coordinates": [
                  1.4561261842558224,
                  43.5860158022156
                ]
              },
              "properties": {
                "index": 1
              }
            },
            {
              "type": "Feature",
              "geometry": {
                "type": "LineString",
                "coordinates": [
                  [
                    1.444187,
                    43.584461
                  ],
                  [
                    1.444174,
                    43.583902
                  ],
                  [
                    1.447712,
                    43.584401
                  ],
                  [
                    1.448439,
                    43.584258
                  ],
                  [
                    1.450551,
                    43.583664
                  ],
                  [
                    1.450716,
                    43.583681
                  ],
                  [
                    1.456207,
                    43.585915
                  ]
                ]
              },
              "properties": {
                "index": 0,
                "isFollowingDirections": true,
                "directionID": 2
              }
            },
            {
              "type": "Feature",
              "geometry": {
                "type": "LineString",
                "coordinates": [
                  [
                    1.4445662176173926,
                    43.58445067008731
                  ],
                  [
                    1.444187,
                    43.584461
                  ]
                ]
              },
              "properties": {
                "index": 0,
                "isPhantomJunction": true,
                "isDeparture": true
              }
            },
            {
              "type": "Feature",
              "geometry": {
                "type": "LineString",
                "coordinates": [
                  [
                    1.456207,
                    43.585915
                  ],
                  [
                    1.4561261842558224,
                    43.5860158022156
                  ]
                ]
              },
              "properties": {
                "index": 0,
                "isPhantomJunction": true,
                "isDeparture": false
              }
            }
          ]
        }

        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://tiles.openfreemap.org/styles/bright',
            center: [1.470006, 43.576803],
            zoom: 12
        });

        async function getRoute(coordinates) {
            return fetch(
                `https://router.project-osrm.org/route/v1/driving/${coordinates.join(
                ";"
                )}?geometries=geojson`,
                {
                    method: "GET",
                    headers: { "Content-Type": "application/json" },
                }
            )
                .then((response) => response.json())
                .then((data) =>
                data.code === "Ok"
                    ? {
                        coordinates: data.routes[0].geometry.coordinates,
                        waypoints: {
                            departure: data.waypoints[0].location,
                            arrival: data.waypoints[1].location,
                        },
                    }
                    : undefined
                );
        }

        // Helpers to convert indexes to alphabetical indexes
        const convertNumberToAlpha = (num) => {
            const letterPosition = Math.floor(num / 26);
            return letterPosition >= 0
            ? convertNumberToAlpha(letterPosition - 1) +
                String.fromCharCode(65 + (num % 26)) // + "AAA"
            : "";
        };

        const expression = Array.from({ length: 78 }, (_, index) => {
            return [["==", ["get", "index"], index], convertNumberToAlpha(index)];
        }).flat();

        function initMapControl () {
            const mapboxPathControl = new MapboxPathControl({
                //themeSelectionType: "select",
                // useRightClickToHandleActionPanel: true,
                translate: (text) => {
                    const locales = {
                        "gl-pathControl.followDirection": "Suivre les routes",
                        "gl-pathControl.enableFollowDirectionMode": "Enable direction with: {{theme}}",
                        "gl-pathControl.disableFollowDirectionMode": "Disable direction",
                        "gl-pathControl.createPoint": "Create point",
                        "gl-pathControl.createIntermediatePoint": "Create intermediate point",
                        "gl-pathControl.deletePoint": "Delete point",
                        "gl-pathControl.loopPoint": "Round trip",
                        "gl-pathControl.oneWayPoint": "One way"
                    }
                    return locales[text]
                },
                directionsThemes: [
                    // {
                    //     id:"driving",
                    //     name: 'Driving',
                    //     // selected: true,
                    //     getPathByCoordinates: getRoute,
                    // },
                    {
                        id: 1,
                        name: 'Walking',
                        // selected: true,
                        getPathByCoordinates: getRoute,
                    },
                    {
                        id: 2,
                        name: 'Cycling',
                        selected: true,
                        getPathByCoordinates: getRoute,
                    },
                    // {
                    //     id:"skiing",
                    //     name: 'Skiing',
                    //     // selected: false,
                    //     getPathByCoordinates: getRoute,
                    // },
                ],
                featureCollection: initialFeatureCollection,
                // lineString: initialLineString,
                layersCustomisation: {
                    pointLayerList: [
                      // {
                      //   // First Point layer to display the "glow"
                      //   paint: {
                      //     "circle-radius": 14,
                      //     "circle-color": "#f7d4bc",
                      //   },
                      // },
                      {
                        // Second Point layer to display white circle
                        paint: {
                          "circle-radius": 10,
                          "circle-color": "#ffffff",
                          "circle-stroke-width": 2,
                          "circle-stroke-color": "#846b8a",
                        },
                      },
                      {
                        // Third Point layer to Alphabetical indexes
                        paint: {
                          "text-color": "#000",
                        },
                        type: "symbol",
                        layout: {
                          "text-field": ["case", ...expression, ["get", "index"]],
                          "text-size": 14,
                          "text-allow-overlap": true,
                        },
                      },
                    ],
                    lineLayerList: [
                      // {
                      //   // First LineString layer to display the "glow"
                      //   paint: { "line-width": 8, "line-color": "#f7d4bc" },
                      // },
                      {
                        // Second LineString layer to display the path
                        paint: { "line-width": 4, "line-color": "#846b8a" },
                      },
                      {
                        // Third LineString layer to the arrow icon
                        type: "symbol",
                        layout: {
                          "icon-image": "arrow",
                          "icon-size": 0.6,
                          "symbol-placement": "line",
                          "icon-allow-overlap": true,
                        },
                      },
                    ],
                    phantomJunctionLineLayerList: [
                      {
                        paint: {
                          "line-width": 4,
                          "line-color": "#c98bb9",
                          "line-dasharray": [1, 1],
                        },
                      },
                    ],
                }
            });

            function clearRoute() {
                mapboxPathControl.clearFeatureCollection()
            }
            document.getElementById("clear-route-btn").addEventListener("click", clearRoute)

            function logRoute() {
                console.log(mapboxPathControl.getFeatureCollection())
            }
            document.getElementById("log-route-btn").addEventListener("click", logRoute)

            function setFeatureCollection() {
                mapboxPathControl.setFeatureCollection(initialFeatureCollection)
            }
            document.getElementById("set-feature-collection-btn").addEventListener("click", setFeatureCollection)

            function setLineString() {
                mapboxPathControl.setLineString(initialLineString)
            }
            document.getElementById("set-linestring-btn").addEventListener("click", setLineString)

            function setLoopTrail() {
                mapboxPathControl.setLoopTrail()
            }
            document.getElementById("log-loop-btn").addEventListener("click", setLoopTrail)

            function setOneWayTrail() {
                mapboxPathControl.setOneWayTrail()
            }
            document.getElementById("log-one-way-btn").addEventListener("click", setOneWayTrail)

            map.addControl(mapboxPathControl, "top-left");
        }

        function loadArrowImage() {
            map.loadImage(
              '/assets/arrow.png',
              (error, image) => {
              if (error) throw error;
              map.addImage('arrow', image, {pixelRatio: 2});
              }
            );
        }

        map.on('load', () => {
            loadArrowImage();
            initMapControl();
        });

    </script>
</body>
</html>
